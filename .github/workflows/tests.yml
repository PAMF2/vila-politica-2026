name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Smoke + syntax (py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements.txt

      - name: Python syntax
        run: python -m py_compile $(git ls-files '*.py')

      - name: Smoke
        env: { PYTHONPATH: "." }
        run: python scripts/smoke_political.py

      - name: Backtest reproducibility
        env: { PYTHONPATH: "." }
        run: python scripts/backtest_political.py

  next-build:
    name: Next.js build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd frontend-next && npm ci && npm run build
